site_name: Cursor Chat for Obsidian
site_description: Technical documentation for the obsidian-cursor-plugin — BYOK, Cursor REST, and SDK bridge backends.
site_url: https://guilyx.github.io/obsidian-cursor-plugin/
repo_url: https://github.com/guilyx/obsidian-cursor-plugin
repo_name: guilyx/obsidian-cursor-plugin
edit_uri: edit/main/.docs/

docs_dir: .docs
site_dir: site

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started:
      - Overview: getting-started/overview.md
      - Installation: getting-started/installation.md
      - Local development: getting-started/local-development.md
  - Architecture:
      - Backend selection: architecture/backend-selection.md
      - System design: architecture/design.md
      - UX specification: architecture/ux.md
  - Backends:
      - backends/index.md
      - BYOK: backends/byok.md
      - Cursor REST: backends/cursor-rest.md
      - SDK bridge: backends/sdk-bridge.md
  - Development:
      - Development guide: development/guide.md
      - Implementation roadmap: development/roadmap.md
      - Building the docs: development/building-docs.md
  - Reference:
      - Changelog: reference/changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/guilyx/obsidian-cursor-plugin

copyright: Copyright &copy; 2026 Erwin Lejeune · <a href="https://github.com/guilyx/obsidian-cursor-plugin/blob/main/LICENSE">MIT License</a>
